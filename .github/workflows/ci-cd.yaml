name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }} .
        docker tag \
        ${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }} \
        ${{ secrets.DOCKER_USERNAME }}/wisecow:latest

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/wisecow:latest

  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Update Deployment
      run: |
        kubectl set image deployment/wisecow \
        wisecow=${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }}

        kubectl rollout status deployment/wisecow
